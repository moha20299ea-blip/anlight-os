# Anlight OS - picom compositor: smooth, elegant animations & effects
backend = "glx";
vsync = true;

# --- Fading ---
fading = true;
fade-in-step = 0.04;
fade-out-step = 0.04;
fade-delta = 5;

# --- Transparency / blur ---
blur-method = "dual_kawase";
blur-strength = 7;
inactive-opacity = 0.92;
active-opacity = 1.0;
frame-opacity = 0.9;
blur-background = true;
blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

# --- Rounded corners (modern, clean) ---
corner-radius = 12;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

# --- Shadows ---
shadow = true;
shadow-radius = 18;
shadow-opacity = 0.45;
shadow-offset-x = -18;
shadow-offset-y = -18;

# --- Window animations (picom-animations forks read these) ---
animations = true;
animation-stiffness = 200;
animation-dampening = 25;
animation-window-mass = 0.5;
animation-for-open-window = "zoom";
animation-for-unmap-window = "slide-down";

opacity-rule = [
  "95:class_g = 'Xfce4-terminal'",
  "100:fullscreen"
];
