# Anlight OS - "Aurora Glass" liquid-glass compositor
backend = "glx";
vsync = true;
use-damage = true;

# --- Fading ---
fading = true;
fade-in-step = 0.035;
fade-out-step = 0.035;
fade-delta = 4;

# --- Liquid glass: strong frosted blur ---
blur-method = "dual_kawase";
blur-strength = 10;
blur-background = true;
blur-background-frame = true;
blur-background-exclude = [
  "window_type = 'desktop'",
  "_GTK_FRAME_EXTENTS@:c"
];

# --- Transparency ---
inactive-opacity = 0.90;
active-opacity = 1.0;
frame-opacity = 0.85;
inactive-opacity-override = false;
opacity-rule = [
  "88:class_g = 'Xfce4-panel'",
  "90:class_g = 'Xfce4-terminal'",
  "92:class_g = 'Thunar'",
  "100:fullscreen"
];

# --- Rounded corners (modern glass) ---
corner-radius = 14;
rounded-corners-exclude = [
  "window_type = 'desktop'",
  "window_type = 'dock'",
  "class_g = 'Plank'"
];

# --- Soft shadows ---
shadow = true;
shadow-radius = 22;
shadow-opacity = 0.40;
shadow-offset-x = -22;
shadow-offset-y = -22;
shadow-exclude = [
  "window_type = 'desktop'"
];

# --- Window animations (open = zoom, close = slide) ---
animations = true;
animation-stiffness = 180;
animation-dampening = 22;
animation-window-mass = 0.4;
animation-for-open-window = "zoom";
animation-for-unmap-window = "slide-down";
animation-for-workspace-switch-in = "zoom";
