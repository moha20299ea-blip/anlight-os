name: Build Anlight OS ISO

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    # Build inside real Debian bookworm so live-build matches the target distro.
    container:
      image: debian:bookworm
      options: --privileged
    steps:
      - name: Install build tools
        run: |
          apt-get update
          apt-get install -y \
            live-build debootstrap \
            git ca-certificates curl xorriso isolinux \
            syslinux-common squashfs-tools dosfstools mtools

      - name: Checkout
        uses: actions/checkout@v4

      - name: Free up disk space
        run: df -h

      - name: Build ISO
        run: |
          chmod +x auto/config
          lb config
          lb build
          ls -lh *.iso

      - name: Rename ISO
        run: |
          ISO=$(ls *.iso | head -n1)
          mv "$ISO" "anlight-os-${GITHUB_SHA::7}.iso"
          ls -lh *.iso

      - name: Publish ISO as Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Anlight OS build ${{ github.run_number }}
          files: anlight-os-*.iso
          body: |
            Automated Anlight OS ISO build.
            Flash with Rufus/balenaEtcher or boot in QEMU/VirtualBox.
